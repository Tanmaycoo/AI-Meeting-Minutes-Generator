# Server Configuration
server.port=8080
server.error.whitelabel.enabled=false

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/meeting_ai_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=150MB
spring.servlet.multipart.max-request-size=150MB

# Logging
logging.level.com.meetingai=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Google Cloud Speech API (Optional - get from Google Cloud Console)
google.cloud.speech.api.key=YOUR_API_KEY_HERE